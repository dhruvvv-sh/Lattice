services:
  api:
    build: .
    container_name: lattice-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lattice
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: lattice-db
    environment:
      POSTGRES_DB: lattice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lattice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
